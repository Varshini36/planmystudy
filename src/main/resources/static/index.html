<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>planmystudy</title>

    <style>
        body { font-family: Arial; background:#0f172a; color:white; margin:0; }
        h1 { text-align:center; }

        .container { display:flex; justify-content:space-around; }
        .column { width:30%; }

        .box { background:#1e293b; padding:15px; margin:10px; border-radius:10px; }

        input, textarea { width:90%; padding:6px; margin:5px 0; }

        button { padding:6px 10px; margin:4px; border:none; border-radius:6px; cursor:pointer; }

        .add { background:#22c55e; }
        .view { background:#3b82f6; }
        .delete { background:#ef4444; color:white; }

        .timer {
            text-align:center;
            font-size:26px;
            margin:10px auto;
            width:120px;
            padding:10px;
            border-radius:50%;
            background:#111827;
        }

        .popup {
            display:none;
            position:fixed;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            background:#1e293b;
            padding:20px;
            width:320px;
            max-height:400px;
            overflow:auto;
            border-radius:10px;
        }

        .item {
            background:#334155;
            padding:10px;
            margin:5px 0;
            border-radius:8px;
        }
    </style>
</head>

<body>

<h1>📚 planmystudy</h1>

<!-- TIMER -->
<div style="text-align:center;">
    <input id="minutesInput" placeholder="min" style="width:60px;">
    <div id="timer" class="timer">00:00</div>
    <br>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<div class="container">

    <!-- TASK -->
    <div class="column">
        <div class="box">
            <h3>Add Task</h3>
            <input id="title" placeholder="Title">
            <input id="desc" placeholder="Description">
            <input id="status" placeholder="pending/completed">
            <button class="add" onclick="addTask()">Add</button>
        </div>

        <div class="box">
            <h3>Tasks</h3>
            <button class="view" onclick="openTaskPopup()">View</button>
        </div>
    </div>

    <!-- NOTES -->
    <div class="column">
        <div class="box">
            <h3>Add Notes</h3>
            <input id="noteSubject" placeholder="Subject">
            <textarea id="noteContent"></textarea>
            <button class="add" onclick="addNote()">Save</button>
            <button class="view" onclick="openNotesPopup()">View</button>
        </div>
    </div>

    <!-- TIMETABLE -->
    <div class="column">
        <div class="box">
            <h3>Timetable</h3>
            <input id="subject" placeholder="Subject">
            <input id="day" placeholder="Day">
            <input id="timeInput" placeholder="Time">
            <button class="add" onclick="addTimetable()">Add</button>
            <button class="view" onclick="openTimetablePopup()">View</button>
        </div>
    </div>

</div>

<!-- POPUPS -->
<div id="taskPopup" class="popup">
    <h3>Tasks</h3>
    <div id="taskPopupContent"></div>
    <button onclick="closePopup('taskPopup')">Close</button>
</div>

<div id="notesPopup" class="popup">
    <h3>Notes</h3>
    <div id="notesPopupContent"></div>
    <button onclick="closePopup('notesPopup')">Close</button>
</div>

<div id="timetablePopup" class="popup">
    <h3>Timetable</h3>
    <div id="timetablePopupContent"></div>
    <button onclick="closePopup('timetablePopup')">Close</button>
</div>

<script>

    // 🔊 SOUND
    const alarmSound = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

    // ---------- TIMER ----------
    let interval = null;
    let remainingTime = 0;

    function updateTimer(){
        let m = Math.floor(remainingTime / 60);
        let s = remainingTime % 60;
        timer.innerText = (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
    }

    function startTimer(){
        if(interval) return;

        if(remainingTime === 0){
            if(!minutesInput.value){
                alert("Enter minutes");
                return;
            }
            remainingTime = minutesInput.value * 60;
        }

        alarmSound.load();

        updateTimer();

        interval = setInterval(()=>{
            if(remainingTime > 0){
                remainingTime--;
                updateTimer();
            } else {
                clearInterval(interval);
                interval = null;

                alarmSound.currentTime = 0;
                alarmSound.play().catch(()=>{});

                alert("Time completed!");
            }
        },1000);
    }

    function stopTimer(){
        clearInterval(interval);
        interval = null;
    }

    function resetTimer(){
        clearInterval(interval);
        interval = null;
        remainingTime = 0;
        updateTimer();
    }

    // ---------- USER ----------
    function getUserId(){
        return localStorage.getItem("userId");
    }

    // ---------- TASK ----------
    function addTask(){
        fetch('/tasks',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                title:title.value,
                description:desc.value || "",
                status:status.value || "pending",
                user:{id:getUserId()}
            })
        }).then(()=>{
            title.value=""; desc.value=""; status.value="";
        });
    }

    function deleteTask(id){
        fetch('/tasks/'+id,{method:'DELETE'})
        .then(res=>{
            if(!res.ok) throw "Error";
            openTaskPopup();
        }).catch(()=>alert("Task delete failed"));
    }

    function openTaskPopup(){
        fetch('/tasks/user/'+getUserId())
        .then(res=>res.json())
        .then(data=>{
            let html="";
            data.forEach(t=>{
                html+=`
                <div class="item">
                ${t.title} - ${t.status}
                <br>
                <button class="delete" onclick="deleteTask(${t.id})">Delete</button>
                </div>`;
            });
            taskPopupContent.innerHTML=html;
            taskPopup.style.display="block";
        });
    }

    // ---------- NOTES ----------
    function addNote(){
        fetch('/notes',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                subject:noteSubject.value,
                content:noteContent.value,
                user:{id:getUserId()}
            })
        }).then(()=>{
            noteSubject.value=""; noteContent.value="";
        });
    }

    function deleteNote(id){
        fetch('/notes/'+id,{method:'DELETE'})
        .then(res=>{
            if(!res.ok) throw "Error";
            openNotesPopup();
        }).catch(()=>alert("Note delete failed"));
    }

    function openNotesPopup(){
        fetch('/notes/user/'+getUserId())
        .then(res=>res.json())
        .then(data=>{
            let html="";
            data.forEach(n=>{
                html+=`
                <div class="item">
                ${n.subject || "No Subject"}: ${n.content || ""}
                <br>
                <button class="delete" onclick="deleteNote(${n.id})">Delete</button>
                </div>`;
            });
            notesPopupContent.innerHTML=html;
            notesPopup.style.display="block";
        });
    }

    // ---------- TIMETABLE ----------
    function addTimetable(){
        if(!subject.value || !day.value){
            alert("Enter subject & day");
            return;
        }

        fetch('/timetable',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                subject:subject.value,
                day:day.value,
                time:timeInput.value || "",
                user:{id:getUserId()}
            })
        }).then(res=>{
            if(!res.ok) throw "Error";
            subject.value=""; day.value=""; timeInput.value="";
        }).catch(()=>alert("Save failed"));
    }

    function deleteTimetable(id){
        fetch('/timetable/'+id,{method:'DELETE'})
        .then(res=>{
            if(!res.ok) throw "Error";
            openTimetablePopup();
        }).catch(()=>alert("Delete failed"));
    }

    function openTimetablePopup(){
        fetch('/timetable/user/'+getUserId())
        .then(res=>res.json())
        .then(data=>{
            let html="";
            data.forEach(t=>{
                html+=`
                <div class="item">
                ${t.subject} - ${t.day} (${t.time || ""})
                <br>
                <button class="delete" onclick="deleteTimetable(${t.id})">Delete</button>
                </div>`;
            });
            timetablePopupContent.innerHTML=html;
            timetablePopup.style.display="block";
        });
    }

    // ---------- CLOSE ----------
    function closePopup(id){
        document.getElementById(id).style.display="none";
    }

</script>

</body>
</html>
