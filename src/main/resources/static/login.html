<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>planmystudy login</title>
</head>

<body style="text-align:center; font-family:Arial; background:#0f172a; color:white;">

<h1>📚 planmystudy</h1>

<h3>Register</h3>
<input id="regUsername" placeholder="Username"><br><br>
<input id="regPassword" placeholder="Password" type="password"><br><br>
<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" placeholder="Password" type="password"><br><br>
<button onclick="login()">Login</button>

<script>
  const BASE_URL = "https://planmystudy-1.onrender.com";

  function register(){
      fetch(BASE_URL + "/register", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
              username: regUsername.value,
              password: regPassword.value
          })
      })
      .then(res => {
          if(!res.ok) throw new Error("Register failed");
          return res.json();
      })
      .then(user => {
          localStorage.setItem("userId", user.id);
          alert("Registered successfully");
          window.location.href = "index.html";
      })
      .catch(err => alert(err.message));
  }

  function login(){
      fetch(BASE_URL + "/login", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
              username: loginUsername.value,
              password: loginPassword.value
          })
      })
      .then(res => {
          if(!res.ok) throw new Error("Login failed");
          return res.json();
      })
      .then(user => {
          if(user && user.id){
              localStorage.setItem("userId", user.id);
              window.location.href = "index.html";
          } else {
              alert("Invalid login");
          }
      })
      .catch(err => alert(err.message));
  }
</script>

</body>
</html>
